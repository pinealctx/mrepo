version: "2"
linters:
  enable:
    - goprintffuncname
    - misspell
    - noctx
    - nolintlint
    - staticcheck
    - tparallel
    - whitespace
  disable:
    - errcheck
    - ineffassign
    - unused
  exclusions:
    generated: lax
    presets:
      - common-false-positives
    rules:
      - text: '(slog|log)\.\w+'
        linters:
          - noctx
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  enable:
    - gofumpt
    - goimports
  exclusions:
    generated: lax
