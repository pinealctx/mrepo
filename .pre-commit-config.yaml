repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.24.3
    hooks:
      - id: gitleaks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
  - repo: local
    hooks:
      - id: go-mod-tidy
        name: go mod tidy
        entry: go mod tidy
        language: system
        types: [go]
        pass_filenames: false
      - id: go-build
        name: go build
        entry: go build ./...
        language: system
        types: [go]
        pass_filenames: false
      - id: go-test
        name: go test
        entry: go test ./...
        language: system
        types: [go]
        pass_filenames: false
      - id: golangci-lint
        name: golangci-lint
        entry: golangci-lint run --config=.golangci.yml --timeout=5m
        language: system
        types: [go]
        pass_filenames: false
  - repo: local
    hooks:
      - id: prevent-main-push
        name: prevent direct push to main
        entry: bash -c 'branch=$(git rev-parse --abbrev-ref HEAD); [ "$branch" != "main" ] && [ "$branch" != "master" ]'
        language: system
        stages: [pre-push]
        pass_filenames: false
