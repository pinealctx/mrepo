# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

project_name: mrepo

metadata:
  mod_timestamp: "{{ .CommitTimestamp }}"
  license: "MIT"
  homepage: "https://github.com/pinealctx/mrepo"
  description: "A CLI and TUI tool for managing multiple Git repositories within a monorepo workspace."

snapshot:
  version_template: "0.0.0-{{ .Timestamp }}"

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/pinealctx/mrepo/internal/version.Version={{.Version}}
    flags:
      - -trimpath

archives:
  - name_template: >-
      mrepo_
      {{- .Version }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
    wrap_in_directory: true
    files:
      - README*
      - LICENSE*
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "checksums.txt"

source:
  enabled: true

sboms:
  - artifacts: archive
  - id: source
    artifacts: source

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "merge conflict"
      - "Merge pull request"
      - "Merge branch"
  groups:
    - title: "Features"
      regexp: "^.*feat[(\\w)]*:+.*$"
      order: 100
    - title: "Fixes"
      regexp: "^.*fix[(\\w)]*:+.*$"
      order: 200
    - title: "Other"
      order: 9999

release:
  prerelease: auto
